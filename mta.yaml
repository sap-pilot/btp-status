_schema-version: "3.3"
ID: btp-status
version: 0.0.2

modules:
  - name: btp-status-srv
    type: nodejs
    path: server
    parameters:
      memory: 256M
      disk-quota: 2G
      buildpack: nodejs_buildpack
      host: btp-status-${org}-${space}
      enable-ssh: true
      keep-existing:
        env: true
    build-parameters:
      builder: custom
      commands:
        - npm ci --prefix ..
        - npm run build --prefix ..
      ignore:
        - response/
    properties:
      CONFIG_FILE: ./config.json

resources: []

_schema-version: "3.3"
ID: btp-status
version: 0.9.0

modules:
  - name: btp-status
    type: nodejs
    path: server
    parameters:
      memory: 1G         # Chrome is memory-hungry — 512M is not enough
      disk-quota: 4G     # Chrome + libs are large
      # docker:
      #   image: sapux/btp-status:latest
      buildpacks:
        - https://github.com/cloudfoundry/apt-buildpack
        - nodejs_buildpack
      host: btp-status-${org}-${space}
      enable-ssh: true
      keep-existing:
        env: true
    build-parameters:
      # no-source: true
      builder: custom
      commands:
        - npm ci --prefix ..
        - npm run build --prefix ..
      ignore:
        - response/
    properties:
      CONFIG_FILE: ./config.json
    requires:
      - name: btp-status-xsuaa

resources:
  - name: btp-status-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        xsappname: btp-status
      path: ./xs-security.json
      service: xsuaa
      service-plan: application